name: Run All

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23,8 * * *" 

jobs:
  update-adblock-plus:  # 来自 adblock-plus.yml
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 下载和处理 AdGuard 规则为 adblock-plus.txt
        run: |
          set -eo pipefail
          # AdGuard规则的URL列表
          ADGUARD_RULES_URLS=(
              "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule.txt"
          )
          all_rules=""
          process_rule_file() {
            local url="$1"
            all_rules+=$(curl -s "$url" |
              grep -Ev '^[@#!;[]' |
              grep -Ev '^\s*$'     |
              grep -Ev '\*'        |
              grep -Ev '/.*'       |
              awk '{gsub(/\|\|/, "domain:");sub(/\^$/, "");sub(/\^\$important$/, ""); print}')$'\n'
          }

          for url in "${ADGUARD_RULES_URLS[@]}"; do
            process_rule_file "$url"
          done

          # 检查是否生成内容
          if [ -z "$all_rules" ]; then
            echo "没有有效规则被生成，请检查输入规则内容。"
            exit 1
          fi

          # 去重并保存
          echo "$all_rules" | sort -u > adblock-plus.txt

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add adblock-plus.txt
          git commit -m 'chore: 同步最新 Adblock Plus 规则' || echo "Nothing to commit"
          git push || echo "Nothing to push"

  update-gfwlist:  # 来自 gfwlist.yml
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: 生成 proxy-list.txt 和 direct-gfw.txt
        run: |
          set -eo pipefail
          
          temp_gfwlist=$(mktemp)
          temp_list=$(mktemp)
          temp_lw=$(mktemp)
          target_file="proxy-list.txt"
          target_lw="direct-gfw.txt"
          
          # 下载 GFWList
          if ! wget --no-proxy -q -O "$temp_gfwlist" "https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt"; then
              echo "下载失败" >&2
              rm -f "$temp_gfwlist" "$temp_list" "$temp_lw"
              exit 1
          fi
          
          # 提取数据
          base64 -d < "$temp_gfwlist" | tee >(
              grep '^@@' | grep -v '^@@/' | \
              sed -nE 's/^@@\|*\|*\*?(https?:\/\/)?([^\/^*]+).*/\2/p' | \
              grep -Ev '^\s*$' | \
              grep -Ev '^([0-9]{1,3}\.){3}[0-9]{1,3}$' | \
              grep -Ev '^(http|https):' | \
              sort -u > "$temp_lw"
          ) | \
          grep -vE '^!|^\[|^@@|^$|^/' | \
          sed -nE 's/^\|*\|*\*?(https?:\/\/)?([^\/^*]+).*/\2/p' | \
          grep -Ev '^\s*$' | \
          grep -Ev '^([0-9]{1,3}\.){3}[0-9]{1,3}$' | \
          grep -Ev '^(http|https):' | \
          sort -u > "$temp_list"
          
          # 检查输出有效
          if [ ! -s "$temp_list" ]; then
              echo "proxy-list.txt 为空，终止提交" >&2
              rm -f "$temp_gfwlist" "$temp_list" "$temp_lw"
              exit 1
          fi
          
          mv -f "$temp_list" "$target_file"
          mv -f "$temp_lw" "$target_lw"
          
          rm -f "$temp_gfwlist"

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add proxy-list.txt direct-gfw.txt
          git commit -m 'chore: 自动同步最新 gfwlist 生成 proxy-list 和 direct-gfw 列表' || echo "Nothing to commit"
          git push || echo "Nothing to push"

  update-nft-base-ips:  # 来自 nft-base-ips.yml
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl jq 

      - name: 生成 nft-base-ips.sh
        run: |
          TMP_TG4=$(mktemp)
          TMP_TG6=$(mktemp)
          TMP_CF4=$(mktemp)
          TMP_CF6=$(mktemp)
          TMP_GIT_ALL=$(mktemp)
          TMP_GIT4=$(mktemp)
          TMP_GIT6=$(mktemp)
          TMP_GOOGLE4=$(mktemp)
          TMP_GOOGLE6=$(mktemp)
          TMP_FACEBOOK4=$(mktemp)
          TMP_FACEBOOK6=$(mktemp)
          TMP_CFJSON4=$(mktemp)
          TMP_CFJSON6=$(mktemp)
          TMP_NETFLIX4=$(mktemp)
          TMP_NETFLIX6=$(mktemp)
          TMP_PRIVATE4=$(mktemp)
          TMP_PRIVATE6=$(mktemp)

          # Telegram
          curl -fsSL "https://core.telegram.org/resources/cidr.txt" |
            grep -Ev '^\s*#|^$' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_TG4"
          curl -fsSL "https://core.telegram.org/resources/cidr.txt" |
            grep ':' | grep / | sort -u > "$TMP_TG6"

          # Cloudflare
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/cloudflare.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_CF4"
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/cloudflare.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep ':' | sort -u > "$TMP_CF6"

          # GitHub
          curl -fsSL "https://api.github.com/meta" | jq -r '.git[]' | sort -u > "$TMP_GIT_ALL"
          grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' "$TMP_GIT_ALL" > "$TMP_GIT4"
          grep -E ':' "$TMP_GIT_ALL" > "$TMP_GIT6"

          # Google
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/google.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_GOOGLE4"
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/google.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep ':' | sort -u > "$TMP_GOOGLE6"

          # Facebook
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/facebook.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_FACEBOOK4"
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/facebook.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep ':' | sort -u > "$TMP_FACEBOOK6"

          # CloudFront
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/cloudfront.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_CFJSON4"
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/cloudfront.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep ':' | sort -u > "$TMP_CFJSON6"

          # Netflix
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/netflix.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_NETFLIX4"
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/netflix.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep ':' | sort -u > "$TMP_NETFLIX6"

          # Private
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/private.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_PRIVATE4"
          curl -fsSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip/private.json" |
            jq -r '[.rules[].ip_cidr[]] | .[]' |
            grep ':' | sort -u > "$TMP_PRIVATE6"

          {
            echo "#!/bin/sh"
            echo "# Private"
            echo "nft add element inet proxy private_ips  { $(paste -sd, "$TMP_PRIVATE4") }"
            echo "nft add element inet proxy private_ips6 { $(paste -sd, "$TMP_PRIVATE6") }"
            echo "# Telegram"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_TG4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_TG6") }"
            echo "# Cloudflare"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CF4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_CF6") }"
            echo "# GitHub"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GIT4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_GIT6") }"
            echo "# Google"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GOOGLE4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_GOOGLE6") }"
            echo "# Facebook"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_FACEBOOK4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_FACEBOOK6") }"
            echo "# CloudFront"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CFJSON4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_CFJSON6") }"
            echo "# Netflix"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_NETFLIX4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_NETFLIX6") }"
          } > nft-base-ips6.sh

          # 仅v4
          {
            echo "#!/bin/sh"
            echo "# Private"
            echo "nft add element inet proxy private_ips  { $(paste -sd, "$TMP_PRIVATE4") }"
            echo "# Telegram"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_TG4") }"
            echo "# Cloudflare"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CF4") }"
            echo "# GitHub"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GIT4") }"
            echo "# Google"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GOOGLE4") }"
            echo "# Facebook"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_FACEBOOK4") }"
            echo "# CloudFront"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CFJSON4") }"
            echo "# Netflix"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_NETFLIX4") }"
          } > nft-base-ips4.sh

          rm -f "$TMP_TG4" "$TMP_TG6" "$TMP_CF4" "$TMP_CF6" "$TMP_GIT_ALL" "$TMP_GIT4" "$TMP_GIT6" "$TMP_GOOGLE4" "$TMP_GOOGLE6" "$TMP_FACEBOOK4" "$TMP_FACEBOOK6" "$TMP_CFJSON4" "$TMP_CFJSON6" "$TMP_NETFLIX4" "$TMP_NETFLIX6" "$TMP_PRIVATE4" "$TMP_PRIVATE6"
          
      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add nft-base-ips4.sh nft-base-ips6.sh
          git commit -m 'chore: 自动同步最新cidr nft' || echo "Nothing to commit"
          git push || echo "Nothing to push"

  generate-proxy-plus:  # 来自 proxy-plus.yml
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 生成 proxy-plus.txt
        run: |
          {
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitch/Twitch.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Reddit/Reddit.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Ubuntu/Ubuntu.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Amazon/Amazon.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disqus/Disqus.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Bahamut/Bahamut.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Python/Python.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/'
          } | sort | uniq | grep -v "\.cn$" > proxy-plus.txt

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add proxy-plus.txt
          git commit -m 'feat: 自动生成 proxy-plus 域名规则' || true
          git push || true

  update-mihomo:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl wget
      - name: 创建 mihomo 目录
        run: mkdir -p mihomo
      - name: 生成 mihomo/ad.list
        run: |
          set -eo pipefail
          curl -s "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule.txt" | \
            grep -Ev '^[@#!;[]' | \
            grep -Ev '^\s*$' | \
            grep -Ev '\*' | \
            grep -Ev '/.*' | \
            awk '{
              line = $0
              if (line ~ /^\|\|/) {
                gsub(/^\|\|/, "", line)
                gsub(/\^(\$important)?$/, "", line)
                if (line != "") print "DOMAIN-SUFFIX," line
              } else {
                gsub(/^\|+/, "", line)
                if (line != "") print "DOMAIN," line
              }
            }' | \
            sort -u > mihomo/ad.list
      - name: 生成 mihomo/proxy.list 和 mihomo/direct.list
        run: |
          set -eo pipefail
          temp_gfwlist=$(mktemp)
          temp_proxy=$(mktemp)
          temp_direct=$(mktemp)
          wget --no-proxy -q -O "$temp_gfwlist" "https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt"
          base64 -d < "$temp_gfwlist" | tee >(
            grep '^@@' | grep -v '^@@/' | \
            sed -nE 's/^@@\|*\|*\*?(https?:\/\/)?([^\/^*]+).*/\2/p' | \
            grep -Ev '^\s*$' | \
            grep -Ev '^([0-9]{1,3}\.){3}[0-9]{1,3}$' | \
            grep -Ev '^(http|https):' | \
            sort -u | \
            awk '{print "DOMAIN-SUFFIX," $0}' > "$temp_direct"
          ) | \
          grep -vE '^!|^\[|^@@|^$|^/' | \
          sed -nE 's/^\|*\|*\*?(https?:\/\/)?([^\/^*]+).*/\2/p' | \
          grep -Ev '^\s*$' | \
          grep -Ev '^([0-9]{1,3}\.){3}[0-9]{1,3}$' | \
          grep -Ev '^(http|https):' | \
          sort -u | \
          awk '{print "DOMAIN-SUFFIX," $0}' > "$temp_proxy"
          mv -f "$temp_proxy" mihomo/proxy.list
          mv -f "$temp_direct" mihomo/direct.list
          rm -f "$temp_gfwlist"
      - name: 生成 mihomo/proxy-plus.list
        run: |
          {
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitch/Twitch.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Reddit/Reddit.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Ubuntu/Ubuntu.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Amazon/Amazon.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disqus/Disqus.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Bahamut/Bahamut.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
            curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Python/Python.list | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,'
          } | sort | uniq | grep -v "\.cn$" > mihomo/proxy-plus.list
          
      - name: 生成 mihomo/github-cidr.list
        run: |
          set -eo pipefail

          TMP_GIT_ALL=$(mktemp)

          # GitHub IP（来自 GitHub API /meta，git 字段）
          curl -fsSL "https://api.github.com/meta" | jq -r '(.git[], .copilot[])' | sort -u > "$TMP_GIT_ALL"

          # 生成 github-cidr.list（IPv4 + IPv6 均支持 IP-CIDR / IP-CIDR6）
          {
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' "$TMP_GIT_ALL" | \
              awk '{print "IP-CIDR," $0 ",no-resolve"}'
            grep -E ':' "$TMP_GIT_ALL" | \
              awk '{print "IP-CIDR6," $0 ",no-resolve"}'
          } | sort -u > mihomo/github-cidr.list
          
          rm -f "$TMP_GIT_ALL"
      
      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mihomo/
          git commit -m 'feat: 自动生成 mihomo 规则文件' || echo "Nothing to commit"
          git push || echo "Nothing to push"
