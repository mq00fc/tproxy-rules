name: Run All

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23,8 * * *"

env:
  CURL_USER_AGENT: "tproxy-rules/automation (+https://github.com/mq00fc/tproxy-rules)"
  CURL_OPTS: "-fsSL --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30"
  CURL_CACHE_BUST: "Cache-Control: no-cache"
  CURL_PRAGMA: "Pragma: no-cache"
  SLEEP_BETWEEN_REQUESTS: "1"

jobs:
  update-adblock-plus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Download and process AdGuard rules
        run: |
          set -eo pipefail
          ADGUARD_RULES_URLS=(
              "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule.txt"
          )
          all_rules=""
          process_rule_file() {
            local url="$1"
            all_rules+=$(curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -s "$url" |
              grep -Ev '^[@#!;[]' |
              grep -Ev '^\s*$'     |
              grep -Ev '\*'        |
              grep -Ev '/.*'       |
              awk '{gsub(/\|\|/, "domain:");sub(/\^$/, "");sub(/\^\$important$/, ""); print}')$'\n'
          }

          for url in "${ADGUARD_RULES_URLS[@]}"; do
            echo "Fetching $url"
            process_rule_file "$url"
          done

          if [ -z "$all_rules" ]; then
            echo "No valid rules generated"
            exit 1
          fi

          echo "$all_rules" | sort -u > adblock-plus.txt

      - name: Commit & push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add adblock-plus.txt
          git commit -m 'chore: sync Adblock Plus rules' || echo "Nothing to commit"
          git push || echo "Nothing to push"

  update-gfwlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Generate proxy-list.txt and direct-gfw.txt
        run: |
          set -eo pipefail

          temp_gfwlist=$(mktemp)
          temp_decoded=$(mktemp)
          target_file="proxy-list.txt"
          target_lw="direct-gfw.txt"

          # Download GFWList with cache-busting headers
          echo "Fetching gfwlist..."
          if ! curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -o "$temp_gfwlist" "https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt"; then
              echo "Download failed" >&2
              rm -f "$temp_gfwlist" "$temp_decoded"
              exit 1
          fi

          base64 -d < "$temp_gfwlist" > "$temp_decoded"

          # ========== proxy-list.txt ==========
          grep -vE '^!|^\[|^@@|^$' "$temp_decoded" | \
          awk '
          /^\/.*\/$/ { next }
          /\*/ { next }
          {
            line = $0
            if (line ~ /^\|\|/) {
              gsub(/^\|\|/, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "domain:" line
              next
            }
            if (line ~ /^\|https?:\/\//) {
              gsub(/^\|https?:\/\//, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "full:" line
              next
            }
            if (line ~ /^\./) {
              gsub(/^\./, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "domain:" line
              next
            }
            gsub(/\/.*/, "", line)
            gsub(/\^.*/, "", line)
            if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/) {
              if (line ~ /\./)
                print "full:" line
              else
                print "keyword:" line
            }
          }
          ' | sort -u > "$target_file"

          # ========== direct-gfw.txt (whitelist) ==========
          grep '^@@' "$temp_decoded" | grep -v '^@@/' | \
          awk '
          /\*/ { next }
          {
            line = $0
            if (line ~ /^@@\|\|/) {
              gsub(/^@@\|\|/, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "domain:" line
              next
            }
            if (line ~ /^@@\|https?:\/\//) {
              gsub(/^@@\|https?:\/\//, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "full:" line
              next
            }
            if (line ~ /^@@\./) {
              gsub(/^@@\./, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "domain:" line
              next
            }
            gsub(/^@@/, "", line)
            gsub(/\/.*/, "", line)
            gsub(/\^.*/, "", line)
            if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/) {
              if (line ~ /\./)
                print "full:" line
              else
                print "keyword:" line
            }
          }
          ' | sort -u > "$target_lw"

          if [ ! -s "$target_file" ]; then
              echo "proxy-list.txt is empty, aborting" >&2
              rm -f "$temp_gfwlist" "$temp_decoded"
              exit 1
          fi

          rm -f "$temp_gfwlist" "$temp_decoded"

      - name: Commit & push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add proxy-list.txt direct-gfw.txt
          git commit -m 'chore: sync gfwlist to proxy-list and direct-gfw' || echo "Nothing to commit"
          git push || echo "Nothing to push"

  update-nft-base-ips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install curl jq
        run: sudo apt-get update && sudo apt-get install -y curl jq coreutils

      - name: Generate nft-base-ips.sh
        run: |
          # Helper: fetch with retry and validate non-empty output
          fetch_url() {
            local url="$1"
            local out="$2"
            local retry=3
            while [ $retry -gt 0 ]; do
              if curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -fsSL -o "$out" "$url" && [ -s "$out" ]; then
                return 0
              fi
              echo "Retry $retry for $url" >&2
              retry=$((retry - 1))
              sleep 2
            done
            return 1
          }

          TMP_TG4=$(mktemp)
          TMP_TG6=$(mktemp)
          TMP_CF=$(mktemp)
          TMP_GIT_ALL=$(mktemp)
          TMP_GIT4=$(mktemp)
          TMP_GIT6=$(mktemp)
          TMP_GOOGLE=$(mktemp)
          TMP_GOOGLE4=$(mktemp)
          TMP_GOOGLE6=$(mktemp)
          TMP_FACEBOOK=$(mktemp)
          TMP_FACEBOOK4=$(mktemp)
          TMP_FACEBOOK6=$(mktemp)
          TMP_CFJSON=$(mktemp)
          TMP_CFJSON4=$(mktemp)
          TMP_CFJSON6=$(mktemp)
          TMP_NETFLIX=$(mktemp)
          TMP_NETFLIX4=$(mktemp)
          TMP_NETFLIX6=$(mktemp)
          TMP_PRIVATE=$(mktemp)
          TMP_PRIVATE4=$(mktemp)
          TMP_PRIVATE6=$(mktemp)

          # Shared MetaCubeX JSON - fetch once, reuse for v4/v6
          META_BASE="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip"

          # Telegram (no JSON, direct text)
          echo "Fetching Telegram CIDRs..."
          curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -s "https://core.telegram.org/resources/cidr.txt" | \
            grep -Ev '^\s*#|^$' | \
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' | \
            sort -u > "$TMP_TG4" || true
          curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -s "https://core.telegram.org/resources/cidr.txt" | \
            grep ':' | grep / | sort -u > "$TMP_TG6" || true

          # Cloudflare
          echo "Fetching Cloudflare..."
          if fetch_url "$META_BASE/cloudflare.json" "$TMP_CF"; then
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_CF" 2>/dev/null | \
              grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' | sort -u > "$TMP_CF4" || true
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_CF" 2>/dev/null | \
              grep ':' | sort -u > "$TMP_CF6" || true
          fi

          # GitHub (rate-limit aware)
          echo "Fetching GitHub..."
          if curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -fsSL -o "$TMP_GIT_ALL" "https://api.github.com/meta" && [ -s "$TMP_GIT_ALL" ]; then
            jq -r '.git[]' "$TMP_GIT_ALL" 2>/dev/null | sort -u > "$TMP_GIT_ALL.tmp" && mv "$TMP_GIT_ALL.tmp" "$TMP_GIT_ALL"
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' "$TMP_GIT_ALL" > "$TMP_GIT4" || true
            grep -E ':' "$TMP_GIT_ALL" > "$TMP_GIT6" || true
          else
            echo "GitHub API failed, using empty list" >&2
            touch "$TMP_GIT_ALL" "$TMP_GIT4" "$TMP_GIT6"
          fi

          # Google
          echo "Fetching Google..."
          if fetch_url "$META_BASE/google.json" "$TMP_GOOGLE"; then
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_GOOGLE" 2>/dev/null | \
              grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' | sort -u > "$TMP_GOOGLE4" || true
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_GOOGLE" 2>/dev/null | \
              grep ':' | sort -u > "$TMP_GOOGLE6" || true
          fi

          # Facebook
          echo "Fetching Facebook..."
          if fetch_url "$META_BASE/facebook.json" "$TMP_FACEBOOK"; then
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_FACEBOOK" 2>/dev/null | \
              grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' | sort -u > "$TMP_FACEBOOK4" || true
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_FACEBOOK" 2>/dev/null | \
              grep ':' | sort -u > "$TMP_FACEBOOK6" || true
          fi

          # CloudFront
          echo "Fetching CloudFront..."
          if fetch_url "$META_BASE/cloudfront.json" "$TMP_CFJSON"; then
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_CFJSON" 2>/dev/null | \
              grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' | sort -u > "$TMP_CFJSON4" || true
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_CFJSON" 2>/dev/null | \
              grep ':' | sort -u > "$TMP_CFJSON6" || true
          fi

          # Netflix
          echo "Fetching Netflix..."
          if fetch_url "$META_BASE/netflix.json" "$TMP_NETFLIX"; then
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_NETFLIX" 2>/dev/null | \
              grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' | sort -u > "$TMP_NETFLIX4" || true
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_NETFLIX" 2>/dev/null | \
              grep ':' | sort -u > "$TMP_NETFLIX6" || true
          fi

          # Private
          echo "Fetching Private..."
          if fetch_url "$META_BASE/private.json" "$TMP_PRIVATE"; then
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_PRIVATE" 2>/dev/null | \
              grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' | sort -u > "$TMP_PRIVATE4" || true
            jq -r '(.rules[] | .ip_cidr[])' "$TMP_PRIVATE" 2>/dev/null | \
              grep ':' | sort -u > "$TMP_PRIVATE6" || true
          fi

          # v4 + v6 combined
          {
            echo "#!/bin/sh"
            echo "# Private"
            echo "nft add element inet proxy private_ips  { $(paste -sd, "$TMP_PRIVATE4") }"
            echo "nft add element inet proxy private_ips6 { $(paste -sd, "$TMP_PRIVATE6") }"
            echo "# Telegram"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_TG4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_TG6") }"
            echo "# Cloudflare"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CF4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_CF6") }"
            echo "# GitHub"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GIT4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_GIT6") }"
            echo "# Google"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GOOGLE4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_GOOGLE6") }"
            echo "# Facebook"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_FACEBOOK4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_FACEBOOK6") }"
            echo "# CloudFront"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CFJSON4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_CFJSON6") }"
            echo "# Netflix"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_NETFLIX4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_NETFLIX6") }"
          } > nft-base-ips6.sh

          # v4 only
          {
            echo "#!/bin/sh"
            echo "# Private"
            echo "nft add element inet proxy private_ips  { $(paste -sd, "$TMP_PRIVATE4") }"
            echo "# Telegram"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_TG4") }"
            echo "# Cloudflare"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CF4") }"
            echo "# GitHub"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GIT4") }"
            echo "# Google"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GOOGLE4") }"
            echo "# Facebook"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_FACEBOOK4") }"
            echo "# CloudFront"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CFJSON4") }"
            echo "# Netflix"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_NETFLIX4") }"
          } > nft-base-ips4.sh

          rm -f "$TMP_TG4" "$TMP_TG6" "$TMP_CF" "$TMP_CF4" "$TMP_CF6" \
                "$TMP_GIT_ALL" "$TMP_GIT4" "$TMP_GIT6" \
                "$TMP_GOOGLE" "$TMP_GOOGLE4" "$TMP_GOOGLE6" \
                "$TMP_FACEBOOK" "$TMP_FACEBOOK4" "$TMP_FACEBOOK6" \
                "$TMP_CFJSON" "$TMP_CFJSON4" "$TMP_CFJSON6" \
                "$TMP_NETFLIX" "$TMP_NETFLIX4" "$TMP_NETFLIX6" \
                "$TMP_PRIVATE" "$TMP_PRIVATE4" "$TMP_PRIVATE6"

      - name: Commit & push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add nft-base-ips4.sh nft-base-ips6.sh
          git commit -m 'chore: sync latest CIDR data for nft' || echo "Nothing to commit"
          git push || echo "Nothing to push"

  generate-proxy-plus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Generate proxy-plus.txt
        run: |
          set -eo pipefail
          urls=(
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitch/Twitch.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Reddit/Reddit.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Ubuntu/Ubuntu.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Amazon/Amazon.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disqus/Disqus.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Bahamut/Bahamut.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Python/Python.list"
          )
          tmp=$(mktemp)
          for url in "${urls[@]}"; do
            echo "Fetching $url"
            curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -s "$url" | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' | sed 's/^DOMAIN,/full:/; s/^DOMAIN-SUFFIX,/domain:/' >> "$tmp" || echo "warning: fetch failed $url" >&2
            sleep "$SLEEP_BETWEEN_REQUESTS"
          done
          sort -u "$tmp" | grep -v "\.cn$" > proxy-plus.txt
          rm -f "$tmp"

      - name: Commit & push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add proxy-plus.txt
          git commit -m 'feat: auto-generate proxy-plus domain rules' || true
          git push || true

  update-mihomo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Create mihomo directory
        run: mkdir -p mihomo

      - name: Generate mihomo/ad.list
        run: |
          set -eo pipefail
          echo "Fetching AWAvenue Ads Rule..."
          curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -s "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule.txt" | \
            grep -Ev '^[@#!;[]' | \
            grep -Ev '^\s*$' | \
            grep -Ev '\*' | \
            grep -Ev '/.*' | \
            awk '
            {
              line = $0
              if (line ~ /^\|\|/) {
                gsub(/^\|\|/, "", line)
                gsub(/\^\$important$/, "", line)
                gsub(/\^$/, "", line)
                if (line != "") print "DOMAIN-SUFFIX," line
              } else {
                gsub(/^\|+/, "", line)
                if (line != "") print "DOMAIN," line
              }
            }' | \
            sort -u > mihomo/ad.list

      - name: Generate mihomo/proxy.list and mihomo/direct.list
        run: |
          set -eo pipefail
          temp_gfwlist=$(mktemp)
          temp_decoded=$(mktemp)

          echo "Fetching gfwlist..."
          curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -o "$temp_gfwlist" "https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt"
          base64 -d < "$temp_gfwlist" > "$temp_decoded"

          # ========== proxy.list ==========
          grep -vE '^!|^\[|^@@|^$' "$temp_decoded" | \
          awk '
          /^\/.*\/$/ { next }
          /\*/ { next }
          {
            line = $0
            if (line ~ /^\|\|/) {
              gsub(/^\|\|/, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "DOMAIN-SUFFIX," line
              next
            }
            if (line ~ /^\|https?:\/\//) {
              gsub(/^\|https?:\/\//, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "DOMAIN," line
              next
            }
            if (line ~ /^\./) {
              gsub(/^\./, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "DOMAIN-SUFFIX," line
              next
            }
            gsub(/\/.*/, "", line)
            gsub(/\^.*/, "", line)
            if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/) {
              if (line ~ /\./)
                print "DOMAIN," line
              else
                print "DOMAIN-KEYWORD," line
            }
          }
          ' | sort -u > mihomo/proxy.list

          # ========== direct.list (whitelist) ==========
          grep '^@@' "$temp_decoded" | grep -v '^@@/' | \
          awk '
          /\*/ { next }
          {
            line = $0
            if (line ~ /^@@\|\|/) {
              gsub(/^@@\|\|/, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "DOMAIN-SUFFIX," line
              next
            }
            if (line ~ /^@@\|https?:\/\//) {
              gsub(/^@@\|https?:\/\//, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "DOMAIN," line
              next
            }
            if (line ~ /^@@\./) {
              gsub(/^@@\./, "", line)
              gsub(/\/.*/, "", line)
              gsub(/\^.*/, "", line)
              if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/)
                print "DOMAIN-SUFFIX," line
              next
            }
            gsub(/^@@/, "", line)
            gsub(/\/.*/, "", line)
            gsub(/\^.*/, "", line)
            if (line != "" && line !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && line !~ /^(http|https):/) {
              if (line ~ /\./)
                print "DOMAIN," line
              else
                print "DOMAIN-KEYWORD," line
            }
          }
          ' | sort -u > mihomo/direct.list

          rm -f "$temp_gfwlist" "$temp_decoded"

      - name: Generate mihomo/proxy-plus.list
        run: |
          set -eo pipefail
          urls=(
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitch/Twitch.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Reddit/Reddit.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Ubuntu/Ubuntu.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Amazon/Amazon.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disqus/Disqus.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Bahamut/Bahamut.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Python/Python.list"
          )
          tmp=$(mktemp)
          for url in "${urls[@]}"; do
            echo "Fetching $url"
            curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -s "$url" | grep -E '^DOMAIN,|^DOMAIN-SUFFIX,' >> "$tmp" || echo "warning: fetch failed $url" >&2
            sleep "$SLEEP_BETWEEN_REQUESTS"
          done
          sort -u "$tmp" | grep -v "\.cn$" > mihomo/proxy-plus.list
          rm -f "$tmp"

      - name: Generate mihomo/github-cidr.list
        run: |
          set -eo pipefail
          TMP_GIT_ALL=$(mktemp)

          echo "Fetching GitHub meta..."
          curl $CURL_OPTS -A "$CURL_USER_AGENT" -H "$CURL_CACHE_BUST" -H "$CURL_PRAGMA" -s "https://api.github.com/meta" | jq -r '(.git[], .copilot[])' | sort -u > "$TMP_GIT_ALL"

          {
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' "$TMP_GIT_ALL" | \
              awk '{print "IP-CIDR," $0 ",no-resolve"}'
            grep -E ':' "$TMP_GIT_ALL" | \
              awk '{print "IP-CIDR6," $0 ",no-resolve"}'
          } | sort -u > mihomo/github-cidr.list

          rm -f "$TMP_GIT_ALL"

      - name: Commit & push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mihomo/
          git commit -m 'feat: auto-generate mihomo rule files' || echo "Nothing to commit"
          git push || echo "Nothing to push"
