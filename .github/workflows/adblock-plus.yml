name: adblock-plus

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-adblock-plus:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 下载和处理 AdGuard 规则为 adblock-plus.txt
        run: |
          set -eo pipefail
          # AdGuard规则的URL列表
          ADGUARD_RULES_URLS=(
              "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule.txt"
          )
          all_rules=""
          process_rule_file() {
            local url="$1"
            all_rules+=$(curl -s "$url" |
              grep -Ev '^[@#!;[]' |
              grep -Ev '^\s*$'     |
              grep -Ev '\*'        |
              grep -Ev '/.*'       |
              awk '{gsub(/\|\|/, "domain:");sub(/\^$/, "");sub(/\^\$important$/, ""); print}')$'\n'
          }

          for url in "${ADGUARD_RULES_URLS[@]}"; do
            process_rule_file "$url"
          done

          # 检查是否生成内容
          if [ -z "$all_rules" ]; then
            echo "没有有效规则被生成，请检查输入规则内容。"
            exit 1
          fi

          # 去重并保存
          echo "$all_rules" | sort -u > adblock-plus.txt

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add adblock-plus.txt
          git commit -m 'chore: 同步最新 Adblock Plus 规则' || echo "Nothing to commit"
          git push || echo "Nothing to push"
