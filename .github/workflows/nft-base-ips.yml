name: nft-base-ips

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-nft-base-ips:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: 生成 nft-base-ips.sh
        run: |
          TMP_CIDR=$(mktemp)
          TMP4=$(mktemp)
          TMP6=$(mktemp)

          # Telegram
          curl -fsSL "https://core.telegram.org/resources/cidr.txt" | grep -Ev '^\s*#|^$' >> "$TMP_CIDR"
          # Cloudflare
          curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv4_cidrs // [] | .[]' >> "$TMP_CIDR"
          curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv6_cidrs // [] | .[]' >> "$TMP_CIDR"

          # 正则提取
          grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' "$TMP_CIDR" | sort -u > "$TMP4"
          grep -E ':' "$TMP_CIDR" | grep / | sort -u > "$TMP6"

          # 生成nft-base-ips.sh，每条命令全部在一行，不让花括号 } 换行
          {
            echo "#!/bin/sh"
            echo -n "nft add element inet proxy ips { "
            paste -sd, "$TMP4"
            echo -n " }"
            echo ""
            echo -n "nft add element inet proxy ips6 { "
            paste -sd, "$TMP6"
            echo -n " }"
            echo ""
          } > nft-base-ips.sh

          # 单独生成ipv4版本的
          {
            echo "#!/bin/sh"
            echo -n "nft add element inet proxy ips { "
            paste -sd, "$TMP4"
            echo -n " }"
            echo ""
          } > nft-base-ips-v4.sh

          cat nft-base-ips.sh
          rm -f "$TMP_CIDR" "$TMP4" "$TMP6"

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add nft-base-ips.sh nft-base-ips-v4.sh
          git commit -m 'chore: 自动同步最新云服务CIDR为nft规则'
          git push
