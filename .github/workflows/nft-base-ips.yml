name: nft-base-ips

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'    # 每天0点UTC
  workflow_dispatch:

jobs:
  update-nft-base-ips:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: 生成 nft-base-ips.sh
        run: |
          set -xeo pipefail

          TMP_CIDR=$(mktemp)
          TMP4=$(mktemp)
          TMP6=$(mktemp)

          # Telegram
          curl -fsSL "https://core.telegram.org/resources/cidr.txt" | grep -Ev '^\s*#|^$' >> "$TMP_CIDR"

          # Cloudflare
          curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv4_cidrs[]' >> "$TMP_CIDR"
          curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv6_cidrs[]' >> "$TMP_CIDR"

          # Google
          curl -fsSL "https://www.gstatic.com/ipranges/goog.json" | jq -r '.prefixes[] | select(.ipv4Prefix != null) | .ipv4Prefix' >> "$TMP_CIDR"
          curl -fsSL "https://www.gstatic.com/ipranges/goog.json" | jq -r '.prefixes[] | select(.ipv6Prefix != null) | .ipv6Prefix' >> "$TMP_CIDR"

          # GitHub
          curl -fsSL "https://api.github.com/meta" | jq -r '..|.[]?|select(type=="string")' | grep -E '^[0-9a-fA-F.:/]+$' >> "$TMP_CIDR"

          echo "==== [DEBUG] CIDR原始内容，供grep调试：===="
          cat "$TMP_CIDR"
          echo "==== END ===="

          # IPv4：更宽松正则，兼容所有标准IP/CIDR
          grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(/\d{1,2})?$' "$TMP_CIDR" | sort -u > "$TMP4"
          # IPv6：有:和/即可
          grep -E ':' "$TMP_CIDR" | grep / | sort -u > "$TMP6"

          {
            echo "#!/bin/sh"
            echo -n "nft add element inet proxy ips { "
            paste -sd, "$TMP4"
            echo " }"
            echo -n "nft add element inet proxy ips6 { "
            paste -sd, "$TMP6"
            echo " }"
          } > nft-base-ips.sh

          cat nft-base-ips.sh # [可选debug，输出生成脚本内容]

          rm -f "$TMP_CIDR" "$TMP4" "$TMP6"

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add nft-base-ips.sh
          git commit -m 'chore: 自动同步最新云服务CIDR为nft规则' || echo "Nothing to commit"
          git push || echo "Nothing to push"
