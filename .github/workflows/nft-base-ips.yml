name: nft-base-ips

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-nft-base-ips:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl jq 
        
      - name: 生成 nft-base-ips.sh
        run: |
          TMP_TG4=$(mktemp)
          TMP_TG6=$(mktemp)
          TMP_CF4=$(mktemp)
          TMP_CF6=$(mktemp)
          TMP_GIT_ALL=$(mktemp)
          TMP_GIT4=$(mktemp)
          TMP_GIT6=$(mktemp)

          # TG
          curl -fsSL "https://core.telegram.org/resources/cidr.txt" |
            grep -Ev '^\s*#|^$' |
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' |
            sort -u > "$TMP_TG4"
          curl -fsSL "https://core.telegram.org/resources/cidr.txt" |
            grep ':' | grep / | sort -u > "$TMP_TG6"

          # Cloudflare
          curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv4_cidrs // [] | .[]' | sort -u > "$TMP_CF4"
          curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv6_cidrs // [] | .[]' | sort -u > "$TMP_CF6"

          # GitHub (git字段包含v4+v6)
          curl -fsSL "https://api.github.com/meta" | jq -r '.git[]' | sort -u > "$TMP_GIT_ALL"
          grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?$' "$TMP_GIT_ALL" > "$TMP_GIT4"
          grep -E ':' "$TMP_GIT_ALL" > "$TMP_GIT6"

          {
            echo "#!/bin/sh"
            echo "# TG"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_TG4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_TG6") }"
            echo "# Cloudflare"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CF4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_CF6") }"
            echo "# GitHub"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GIT4") }"
            echo "nft add element inet proxy ips6 { $(paste -sd, "$TMP_GIT6") }"
          } > nft-base-ips.sh

          # 仅v4
          {
            echo "#!/bin/sh"
            echo "# TG"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_TG4") }"
            echo "# Cloudflare"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_CF4") }"
            echo "# GitHub"
            echo "nft add element inet proxy ips { $(paste -sd, "$TMP_GIT4") }"
          } > nft-base-ips-v4.sh

          rm -f "$TMP_TG4" "$TMP_TG6" "$TMP_CF4" "$TMP_CF6" "$TMP_GIT_ALL" "$TMP_GIT4" "$TMP_GIT6"

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add nft-base-ips.sh nft-base-ips-v4.sh
          git commit -m 'chore: 自动同步最新云服务CIDR为nft规则' || true
          git push || true
