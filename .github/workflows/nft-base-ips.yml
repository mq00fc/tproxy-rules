name: nft-base-ips

on:
  schedule:
    - cron: '0 0 * * *'    # 每天0点
  workflow_dispatch:

jobs:
  update-nft-base-ips:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: 生成 nft-base-ips.sh
        run: |
          set -xeo pipefail

          TMP_CIDR=$(mktemp)
          TMP4=$(mktemp)
          TMP6=$(mktemp)

          # Telegram
          if ! curl -fsSL "https://core.telegram.org/resources/cidr.txt" | grep -Ev '^\s*#|^$' >> "$TMP_CIDR"; then
            echo "拉取Telegram CIDR失败" >&2
            exit 1
          fi

          # Cloudflare - 拆开提取防止结果null炸掉
          if ! curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv4_cidrs[]' >> "$TMP_CIDR"; then
            echo "拉取Cloudflare IPv4失败" >&2
            exit 1
          fi
          if ! curl -fsSL "https://api.cloudflare.com/client/v4/ips" | jq -r '.result.ipv6_cidrs[]' >> "$TMP_CIDR"; then
            echo "拉取Cloudflare IPv6失败" >&2
            exit 1
          fi

          # Google IPv4
          if ! curl -fsSL "https://www.gstatic.com/ipranges/goog.json" | jq -r '.prefixes[] | select(.ipv4Prefix != null) | .ipv4Prefix' >> "$TMP_CIDR"; then
            echo "拉取Google IPv4失败" >&2
            exit 1
          fi
          # Google IPv6
          if ! curl -fsSL "https://www.gstatic.com/ipranges/goog.json" | jq -r '.prefixes[] | select(.ipv6Prefix != null) | .ipv6Prefix' >> "$TMP_CIDR"; then
            echo "拉取Google IPv6失败" >&2
            exit 1
          fi

          # GitHub
          if ! curl -fsSL "https://api.github.com/meta" \
            | jq -r '..|.[]?|select(type=="string")' \
            | grep -E '^[0-9a-fA-F.:/]+$' >> "$TMP_CIDR"; then
            echo "拉取GitHub CIDR失败" >&2
            exit 1
          fi

          # 提取 IPv4 CIDR
          grep -E '^[0-9]{1,3}(\.[0-9]{1,3}){3}(/\d{1,2})?$' "$TMP_CIDR" | sort -u > "$TMP4" || true
          # 提取 IPv6 CIDR
          grep -E ':' "$TMP_CIDR" | grep / | sort -u > "$TMP6" || true

          # 拼合nft规则文件
          {
            echo "#!/bin/sh"
            echo -n "nft add element inet proxy ips { "
            paste -sd, "$TMP4"
            echo " }"
            echo -n "nft add element inet proxy ips6 { "
            paste -sd, "$TMP6"
            echo " }"
          } > nft-base-ips.sh

          rm -f "$TMP_CIDR" "$TMP4" "$TMP6"

      - name: 提交变更
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add nft-base-ips.sh
          git commit -m 'chore: 自动同步最新云服务CIDR为nft规则' || echo "Nothing to commit"
          git push || echo "Nothing to push"
